name: Daily Summary Routine

on:
  # Schedule removed — cron now runs natively via Cloudflare Workers triggers (wrangler.toml).
  # Keep workflow_dispatch for manual testing of the /api/cron/daily-summary endpoint.
  workflow_dispatch:

jobs:
  run-daily-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Daily Action Summary
        run: |
          body=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X POST "${{ secrets.APP_URL }}/api/cron/daily-summary" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          http_status=$(echo "$body" | grep "HTTP_STATUS:" | cut -d: -f2)
          response_body=$(echo "$body" | sed '/HTTP_STATUS:/d')
          echo "Response status: $http_status"
          echo "Response body: $response_body"
          if [ "$http_status" != "200" ]; then
            echo "Cron run failed with status $http_status"
            exit 1
          fi
