name: Daily Summary Routine

on:
  schedule:
    # 12:00 UTC = 7:00 AM EST (UTC-5) | 8:00 AM EDT (UTC-4) during daylight saving
    - cron: '0 12 * * *'
  workflow_dispatch: # allow manual trigger from GitHub Actions UI

jobs:
  run-daily-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Daily Action Summary
        run: |
          body=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X POST "${{ secrets.APP_URL }}/api/cron/daily-summary" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          http_status=$(echo "$body" | grep "HTTP_STATUS:" | cut -d: -f2)
          response_body=$(echo "$body" | sed '/HTTP_STATUS:/d')
          echo "Response status: $http_status"
          echo "Response body: $response_body"
          if [ "$http_status" != "200" ]; then
            echo "Cron run failed with status $http_status"
            exit 1
          fi
